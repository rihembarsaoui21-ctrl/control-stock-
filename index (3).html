<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jalta Hotel — Contrôle Stock Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b1f18;
    --ink-dim:#8a7563;
    --bg:#faf6f0;
    --bg-2:#f1e9dd;
    --panel:#ffffff;
    --line:rgba(43,31,24,0.14);
    --gold:#a8791f;
    --wine:#7c2431;
    --wine-bright:#932b3a;
    --ok:#3f7a4a;
    --ok-bg:rgba(63,122,74,0.12);
    --bad:#b03d33;
    --bad-bg:rgba(176,61,51,0.12);
    --over:#a8791f;
    --over-bg:rgba(168,121,31,0.14);
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(124,36,49,0.07), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:28px 18px 80px;display:none;}

  header.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:22px;
  }
  .brand-eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 6px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(24px,4vw,34px);
    margin:0;
    letter-spacing:-0.01em;
  }
  .header-fields{display:flex;gap:16px;flex-wrap:wrap;}
  .date-field{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
  .date-field label{font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.08em;}
  input[type=date], input[type=time], input[type=text]#responsableInput{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 10px;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:14px;
  }
  input[type=text]#responsableInput{width:170px;}
  input[type=date]:focus, input[type=time]:focus, input[type=text]#responsableInput:focus{outline:none;border-color:var(--gold);}

  .cat-switch{
    display:flex;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:3px;
    gap:3px;
  }
  .cat-switch button{
    border:none;
    background:transparent;
    color:var(--ink-dim);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    padding:6px 14px;
    border-radius:6px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  .cat-switch button.active{
    background:var(--wine);
    color:#fff;
  }
  .cat-switch button:not(.active):hover{color:var(--ink);}

  nav.tabs{
    display:flex;
    gap:6px;
    margin-bottom:22px;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    background:none;
    border:none;
    color:var(--ink-dim);
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    padding:10px 16px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  nav.tabs button.active{color:var(--ink);border-bottom-color:var(--gold);}
  nav.tabs button:hover{color:var(--ink);}

  .summary-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;
    margin-bottom:24px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:700;}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-dim);margin-top:2px;}
  .stat.bad .n{color:var(--bad);}
  .stat.over .n{color:var(--over);}
  .stat.ok .n{color:var(--ok);}

  .category{margin-bottom:26px;}
  .category h2{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    color:var(--gold);
    margin:0 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .category h2 .add-btn{
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--ink-dim);
    background:none;
    border:1px solid var(--line);
    border-radius:6px;
    padding:4px 10px;
    cursor:pointer;
  }
  .category h2 .add-btn:hover{color:var(--ink);border-color:var(--gold);}

  .table-scroll{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--line);}
  table{width:100%;border-collapse:collapse;min-width:640px;}
  thead th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-dim);
    padding:10px 12px;
    background:var(--bg-2);
    white-space:nowrap;
    position:sticky;top:0;
  }
  tbody td{
    padding:8px 12px;
    border-top:1px solid var(--line);
    font-size:14px;
    vertical-align:middle;
    white-space:nowrap;
  }
  tbody tr:hover{background:rgba(244,234,217,0.03);}
  td.name{white-space:normal;min-width:160px;font-weight:500;}
  td.num{color:var(--ink-dim);}
  input.cell-input{
    width:70px;
    background:var(--bg-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:6px 8px;
    border-radius:6px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  input.cell-input:focus{outline:none;border-color:var(--gold);}
  input.comment-input{width:180px;}
  .badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
    min-width:42px;
    text-align:center;
  }
  .badge.ok{background:var(--ok-bg);color:var(--ok);}
  .badge.bad{background:var(--bad-bg);color:var(--bad);}
  .badge.over{background:var(--over-bg);color:var(--over);}
  .del-btn{
    background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:16px;
  }
  .del-btn:hover{color:var(--bad);}

  .actions-bar{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:14px;
    position:sticky;
    bottom:14px;
  }
  button.primary{
    background:var(--wine);
    color:var(--ink);
    border:1px solid var(--wine-bright);
    padding:12px 22px;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(124,36,49,0.35);
  }
  button.primary:hover{background:var(--wine-bright);}
  button.ghost{
    background:none;
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:12px 18px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  button.ghost:hover{color:var(--ink);border-color:var(--gold);}

  .empty{
    text-align:center;
    color:var(--ink-dim);
    padding:60px 20px;
    font-size:14px;
  }
  .empty .sig{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);margin-bottom:8px;}

  .history-list{display:flex;flex-direction:column;gap:8px;}
  .history-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 16px;
    cursor:pointer;
  }
  .history-item:hover{border-color:var(--gold);}
  .history-item .d{font-weight:600;}
  .history-item .m{font-size:12px;color:var(--ink-dim);}
  .history-click{cursor:pointer;flex:1;}
  .hist-del-btn{
    background:none;
    border:none;
    color:var(--ink-dim);
    cursor:pointer;
    font-size:16px;
    padding:4px 8px;
  }
  .hist-del-btn:hover{color:var(--bad);}
  .hist-print-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-size:15px;
    padding:4px 6px;
    opacity:0.75;
  }
  .hist-print-btn:hover{opacity:1;}

  .config-note{
    font-size:13px;
    color:var(--ink-dim);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 16px;
    margin-bottom:20px;
    line-height:1.5;
  }
  .config-note b{color:var(--gold);}

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--panel);
    border:1px solid var(--gold);
    color:var(--ink);
    padding:10px 20px;
    border-radius:8px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
    z-index:50;
  }
  .toast.show{opacity:1;}

  .auth-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(43,31,24,0.45);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .auth-overlay.show{display:flex;}
  .auth-modal{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 24px;
    max-width:340px;
    width:100%;
    box-shadow:0 12px 30px rgba(43,31,24,0.18);
  }
  .auth-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:700;
    margin:0 0 6px;
  }
  .auth-sub{
    font-size:13px;
    color:var(--ink-dim);
    margin:0 0 16px;
    line-height:1.5;
  }
  #authPasswordInput{
    width:100%;
    background:var(--bg-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  #authPasswordInput:focus{outline:none;border-color:var(--gold);}
  .auth-error{color:var(--bad);font-size:12px;margin:8px 0 0;}
  .auth-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  .report-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(43,31,24,0.5);
    z-index:110;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .report-overlay.show{display:flex;}
  .report-modal{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    max-width:820px;
    width:100%;
    max-height:88vh;
    display:flex;
    flex-direction:column;
    box-shadow:0 12px 30px rgba(43,31,24,0.2);
  }
  .report-modal-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    border-bottom:1px solid var(--line);
  }
  .report-modal-title{font-family:'Fraunces',serif;font-weight:700;font-size:18px;margin:0;}
  .report-scroll{overflow-y:auto;padding:20px;}
  .report-modal-actions{
    padding:14px 20px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:flex-end;
  }

  .pr-header{margin-bottom:14px;}
  .pr-hotel{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin:0 0 4px;}
  .pr-header h2{font-family:'Fraunces',serif;font-size:20px;margin:0 0 10px;}
  .pr-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--ink-dim);}
  .pr-meta b{color:var(--ink);font-weight:600;}
  .pr-summary{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
  .pr-chip{
    font-size:12px;
    padding:4px 10px;
    border-radius:20px;
    background:var(--bg-2);
    color:var(--ink-dim);
    border:1px solid var(--line);
  }
  .pr-chip.ok{color:var(--ok);border-color:var(--ok);}
  .pr-chip.bad{color:var(--bad);border-color:var(--bad);}
  .pr-chip.over{color:var(--over);border-color:var(--over);}
  table.pr-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.pr-table th{
    text-align:left;
    padding:6px 8px;
    background:var(--bg-2);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-dim);
    border-bottom:1px solid var(--line);
  }
  table.pr-table td{padding:6px 8px;border-bottom:1px solid var(--line);}
  tr.pr-cat-row td{
    font-weight:700;
    color:var(--gold);
    background:var(--bg-2);
    padding-top:10px;
  }
  .pr-signatures{
    display:flex;
    gap:40px;
    margin-top:34px;
  }
  .pr-signatures > div{flex:1;font-size:12px;color:var(--ink-dim);}
  .pr-sign-line{border-bottom:1px solid var(--ink-dim);height:44px;margin-top:6px;}

  @media print{
    .wrap, .toast, .auth-overlay{ display:none !important; }
    .report-overlay{
      position:static !important;
      display:block !important;
      background:none !important;
      padding:0 !important;
    }
    .report-modal{
      position:static !important;
      max-width:none !important;
      max-height:none !important;
      width:100% !important;
      box-shadow:none !important;
      border:none !important;
      display:block !important;
    }
    .report-modal-top, .report-modal-actions{display:none !important;}
    .report-scroll{overflow:visible !important; max-height:none !important; padding:0 !important;}
    #printArea{position:static !important; width:auto !important;}
  }

  .add-item-row td{background:var(--bg-2);}
  .new-name-input{width:150px !important;}

  @media (max-width:600px){
    .date-field{align-items:flex-start;}
    header.top{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <p class="brand-eyebrow" id="brandEyebrow">Jalta Hotel · Bar</p>
      <h1>Contrôle du stock</h1>
    </div>
    <div class="header-fields">
      <div class="date-field">
        <label for="reportDate">Date du contrôle</label>
        <input type="date" id="reportDate">
      </div>
      <div class="date-field">
        <label for="responsableInput">Contrôle effectué par</label>
        <input type="text" id="responsableInput" placeholder="Nom du responsable">
        <div class="cat-switch" id="catSwitch">
          <button type="button" data-cat="bar" class="active">Bar</button>
          <button type="button" data-cat="snack">Snack</button>
        </div>
      </div>
      <div class="date-field">
        <label for="heureInput">Heure de l'inventaire</label>
        <input type="time" id="heureInput">
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="today">Contrôle du jour</button>
    <button data-tab="history" class="active">Historique</button>
    <button data-tab="config">Configuration du stock fixe</button>
  </nav>

  <div id="tab-today" style="display:none;"></div>
  <div id="tab-history"></div>
  <div id="tab-config" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <p class="auth-title">Accès protégé</p>
    <p class="auth-sub">La saisie du contrôle est réservée aux personnes autorisées. Entrez le mot de passe pour continuer.</p>
    <input type="password" id="authPasswordInput" placeholder="Mot de passe" autocomplete="off">
    <p class="auth-error" id="authError" style="display:none;">Mot de passe incorrect.</p>
    <div class="auth-actions">
      <button class="ghost" id="authCancelBtn">Annuler</button>
      <button class="primary" id="authSubmitBtn">Valider</button>
    </div>
  </div>
</div>

<div class="report-overlay" id="reportOverlay">
  <div class="report-modal">
    <div class="report-modal-top">
      <p class="report-modal-title">Rapport de contrôle</p>
      <button class="ghost" id="reportCloseBtn">Fermer</button>
    </div>
    <div class="report-scroll">
      <div id="printArea"></div>
    </div>
    <div class="report-modal-actions">
      <button class="primary" id="reportPrintBtn">🖨️ Imprimer</button>
    </div>
  </div>
</div>

<script>
const BAR_CATEGORIES = ["Soft","Bière","Vin Blanc","Vin Rosé","Vin Rouge","Autres"];
const SNACK_CATEGORIES = BAR_CATEGORIES;

// ============================================================
// COLLEZ ICI L'URL DE VOTRE APPLICATION WEB GOOGLE APPS SCRIPT
// (voir le fichier google-apps-script.gs pour les instructions)
// Exemple : "https://script.google.com/macros/s/AKfycb.../exec"
// ============================================================
const API_URL = "https://script.google.com/macros/s/AKfycbw8o_LH0FagsgmGZ_OOPjap_rmnxun495OH0VxDscPT3S2Rcmj_syi2XE_hd_1BfGgP/exec";

// Charge une ressource via JSONP (contourne les restrictions CORS
// des navigateurs, nécessaire pour parler à Google Apps Script
// depuis une page hébergée ailleurs, ex: GitHub Pages).
function jsonp(url){
  return new Promise((resolve, reject)=>{
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const cleanup = ()=>{ delete window[cbName]; script.remove(); };
    window[cbName] = (data)=>{ resolve(data); cleanup(); };
    script.onerror = ()=>{ reject(new Error('Requête réseau échouée')); cleanup(); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

const storage = {
  async get(key){
    if(API_URL.indexOf('COLLEZ_VOTRE_URL') === 0){
      throw new Error("L'URL Google Apps Script n'a pas encore été configurée");
    }
    const data = await jsonp(`${API_URL}?action=get&key=${encodeURIComponent(key)}`);
    if(!data.found) throw new Error('not found');
    return { key, value: data.value };
  },
  async set(key, value){
    if(API_URL.indexOf('COLLEZ_VOTRE_URL') === 0){
      throw new Error("L'URL Google Apps Script n'a pas encore été configurée");
    }
    await jsonp(`${API_URL}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`);
    return { key, value };
  },
  async list(prefix){
    if(API_URL.indexOf('COLLEZ_VOTRE_URL') === 0){
      throw new Error("L'URL Google Apps Script n'a pas encore été configurée");
    }
    const data = await jsonp(`${API_URL}?action=list&prefix=${encodeURIComponent(prefix || '')}`);
    return { keys: data.keys || [] };
  },
  async delete(key){
    if(API_URL.indexOf('COLLEZ_VOTRE_URL') === 0){
      throw new Error("L'URL Google Apps Script n'a pas encore été configurée");
    }
    await jsonp(`${API_URL}?action=delete&key=${encodeURIComponent(key)}`);
    return { key, deleted: true };
  }
};

const BAR_DEFAULT_ITEMS = [
  ["Soft","Safia 1.5L",12],["Soft","Garci",6],["Soft","Soda Boite",12],["Soft","Tonic",12],
  ["Soft","Shark",12],["Soft","Coca Zero Boite",6],

  ["Bière","Celtia",600],["Bière","Amstel",72],["Bière","Becks",600],["Bière","Heineken",72],

  ["Vin Blanc","Magon",3],["Vin Blanc","Muscat",3],["Vin Blanc","Sultan",3],["Vin Blanc","Jour et Nuit",3],
  ["Vin Blanc","Chardonnay",3],["Vin Blanc","Magnifique",3],["Vin Blanc","Kuribis",1],["Vin Blanc","Gioia",1],
  ["Vin Blanc","Bougène",1],["Vin Blanc","Sultan 1/2",3],["Vin Blanc","Jour et Nuit 1/2",3],

  ["Vin Rosé","Magon",3],["Vin Rosé","Désir",3],["Vin Rosé","Jour et Nuit",3],["Vin Rosé","Sultan",3],
  ["Vin Rosé","Magnifique",3],["Vin Rosé","Magon 1/2",3],["Vin Rosé","Jour et Nuit 1/2",3],

  ["Vin Rouge","Magon",3],["Vin Rouge","Phenicia",1],["Vin Rouge","Magon Signature",3],["Vin Rouge","Sultan",2],
  ["Vin Rouge","Kuribis",1],["Vin Rouge","Jour et Nuit",1],["Vin Rouge","Magnifique",3],["Vin Rouge","Gioia",1],
  ["Vin Rouge","Vieille Cave",1],["Vin Rouge","Magon 1/2",3],

  ["Autres","JW Red 50CL",2],["Autres","Vodka Absolute 1L",1],["Autres","Vodka Absolute 50CL",2],
  ["Autres","Vodka Absolute 20CL",3]
];

const SNACK_DEFAULT_ITEMS = BAR_DEFAULT_ITEMS;

// Catégorie active : "bar" ou "snack". Chaque catégorie a sa propre
// configuration de stock fixe et son propre historique.
let currentCategory = localStorage.getItem('jalta_category') || 'bar';

function getCategoriesList(){ return currentCategory === 'snack' ? SNACK_CATEGORIES : BAR_CATEGORIES; }
function getDefaultItems(){ return currentCategory === 'snack' ? SNACK_DEFAULT_ITEMS : BAR_DEFAULT_ITEMS; }
function getItemsKey(){ return currentCategory === 'snack' ? 'config:items:snack' : 'config:items'; }
function getReportKeyPrefix(){ return currentCategory === 'snack' ? 'report:snack:' : 'report:'; }
function getCategoryLabel(){ return currentCategory === 'snack' ? 'Snack' : 'Bar'; }

let items = [];        // {id, category, name, fixedStock}
let currentEntries = {}; // itemId -> {ventes, stockReel}
let currentDate = new Date().toISOString().slice(0,10);
let currentResponsable = '';
let currentHeure = '';

function uid(){ return 'i'+Math.random().toString(36).slice(2,10); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function loadItems(){
  try{
    const res = await storage.get(getItemsKey());
    if(res && res.value){
      items = JSON.parse(res.value);
      return;
    }
  }catch(e){ /* not found yet */ }
  items = getDefaultItems().map(([category,name,fixedStock])=>({id:uid(),category,name,fixedStock}));
  await saveItems();
}

async function saveItems(){
  try{
    await storage.set(getItemsKey(), JSON.stringify(items));
  }catch(e){ console.error('Erreur sauvegarde config', e); }
}

async function loadReport(date){
  try{
    const res = await storage.get(getReportKeyPrefix()+date);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      currentEntries = parsed.entries || {};
      currentResponsable = parsed.responsable || '';
      currentHeure = parsed.heure || '';
      document.getElementById('responsableInput').value = currentResponsable;
      document.getElementById('heureInput').value = currentHeure;
      return;
    }
  }catch(e){ /* no report for this date yet */ }
  currentEntries = {};
  currentResponsable = '';
  currentHeure = '';
  document.getElementById('responsableInput').value = '';
  document.getElementById('heureInput').value = '';
}

async function saveReport(date){
  const payload = { date, responsable: currentResponsable, heure: currentHeure, category: currentCategory, entries: currentEntries, savedAt: new Date().toISOString() };
  try{
    const r = await storage.set(getReportKeyPrefix()+date, JSON.stringify(payload));
    if(!r) throw new Error('no result');
    showToast('Contrôle du '+formatDate(date)+' enregistré');
    showPrintableReport(payload);
    // Réinitialise l'écran pour le prochain contrôle : les données saisies
    // restent bien sauvegardées et consultables dans l'onglet Historique.
    currentEntries = {};
    currentResponsable = '';
    currentHeure = '';
    document.getElementById('responsableInput').value = '';
    document.getElementById('heureInput').value = '';
    renderToday();
  }catch(e){
    console.error(e);
    showToast('Erreur : la sauvegarde a échoué');
  }
}

// Construit le rapport imprimable (HTML) pour un contrôle donné, en
// calculant l'écart de chaque article à partir de la configuration
// actuelle du stock fixe.
function buildReportHTML(payload){
  const entries = payload.entries || {};
  const cats = payload.category === 'snack' ? SNACK_CATEGORIES : BAR_CATEGORIES;
  const byCategory = {};
  cats.forEach(c=>byCategory[c]=[]);

  let totalOk=0, totalManque=0, totalSurplus=0, totalNonCompte=0;

  items.forEach(item=>{
    const e = entries[item.id] || {};
    const ventes = e.ventes !== undefined && e.ventes !== '' ? Number(e.ventes) : 0;
    const stockReel = e.stockReel !== undefined && e.stockReel !== '' ? Number(e.stockReel) : null;
    const attendu = item.fixedStock - ventes;
    let ecart = null, status = null;
    if(stockReel !== null){
      ecart = stockReel - attendu;
      status = ecart === 0 ? 'ok' : (ecart < 0 ? 'bad' : 'over');
      if(status==='ok') totalOk++; else if(status==='bad') totalManque++; else totalSurplus++;
    } else {
      totalNonCompte++;
    }
    if(!byCategory[item.category]) byCategory[item.category] = [];
    byCategory[item.category].push({item, ventes, attendu, stockReel, ecart, status, commentaire:e.commentaire || ''});
  });

  let rowsHtml = '';
  cats.forEach(cat=>{
    const rows = byCategory[cat];
    if(!rows || rows.length===0) return;
    rowsHtml += `<tr class="pr-cat-row"><td colspan="7">${cat}</td></tr>`;
    rows.forEach(({item,ventes,attendu,stockReel,ecart,commentaire})=>{
      rowsHtml += `<tr>
        <td>${item.name}</td>
        <td>${item.fixedStock}</td>
        <td>${ventes}</td>
        <td>${attendu}</td>
        <td>${stockReel === null ? '—' : stockReel}</td>
        <td>${ecart === null ? '—' : (ecart>0?'+':'')+ecart}</td>
        <td>${commentaire || ''}</td>
      </tr>`;
    });
  });

  return `
    <div class="pr-header">
      <p class="pr-hotel">Jalta Hotel · ${payload.category === 'snack' ? 'Snack' : 'Bar'}</p>
      <h2>Rapport de contrôle du stock</h2>
      <div class="pr-meta">
        <span><b>Date :</b> ${formatDate(payload.date)}</span>
        <span><b>Heure :</b> ${payload.heure || '—'}</span>
        <span><b>Contrôle effectué par :</b> ${payload.responsable || '—'}</span>
      </div>
    </div>
    <div class="pr-summary">
      <span class="pr-chip ok">${totalOk} conformes</span>
      <span class="pr-chip bad">${totalManque} manque(s)</span>
      <span class="pr-chip over">${totalSurplus} surplus</span>
      <span class="pr-chip">${totalNonCompte} non comptés</span>
    </div>
    <table class="pr-table">
      <thead><tr>
        <th>Désignation</th><th>Stock fixe</th><th>Ventes</th><th>Stock attendu</th>
        <th>Stock réel</th><th>Écart</th><th>Commentaire</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div class="pr-signatures">
      <div><p>Signature responsable du contrôle</p><div class="pr-sign-line"></div></div>
      <div><p>Signature service (8h / 16h)</p><div class="pr-sign-line"></div></div>
    </div>
  `;
}

function showPrintableReport(payload){
  const overlay = document.getElementById('reportOverlay');
  const printArea = document.getElementById('printArea');
  printArea.innerHTML = buildReportHTML(payload);
  overlay.classList.add('show');
}

document.getElementById('reportCloseBtn').addEventListener('click', ()=>{
  document.getElementById('reportOverlay').classList.remove('show');
});
document.getElementById('reportPrintBtn').addEventListener('click', ()=>{
  window.print();
});

function formatDate(iso){
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}

function computeRow(item){
  const e = currentEntries[item.id] || {};
  const ventes = e.ventes !== undefined && e.ventes !== '' ? Number(e.ventes) : 0;
  const stockReel = e.stockReel !== undefined && e.stockReel !== '' ? Number(e.stockReel) : null;
  const attendu = item.fixedStock - ventes;
  let ecart = null, status = null;
  if(stockReel !== null){
    ecart = stockReel - attendu;
    status = ecart === 0 ? 'ok' : (ecart < 0 ? 'bad' : 'over');
  }
  return {ventes, stockReel, attendu, ecart, status};
}

function renderToday(){
  const el = document.getElementById('tab-today');
  if(items.length === 0){
    el.innerHTML = `<div class="empty"><p class="sig">Aucun article configuré</p><p>Ajoutez vos articles et leur stock fixe dans l'onglet Configuration.</p></div>`;
    return;
  }

  let totalManque = 0, totalSurplus = 0, totalOk = 0, totalNonCompte = 0;
  const rowsByCategory = {};
  const cats = getCategoriesList();
  cats.forEach(c => rowsByCategory[c] = []);

  items.forEach(item=>{
    const r = computeRow(item);
    if(r.stockReel === null) totalNonCompte++;
    else if(r.status === 'ok') totalOk++;
    else if(r.status === 'bad') totalManque++;
    else if(r.status === 'over') totalSurplus++;
    if(!rowsByCategory[item.category]) rowsByCategory[item.category] = [];
    rowsByCategory[item.category].push({item, r});
  });

  let html = `
    <div class="summary-row">
      <div class="stat ok"><div class="n" id="stat-ok">${totalOk}</div><div class="l">Stock conforme</div></div>
      <div class="stat bad"><div class="n" id="stat-bad">${totalManque}</div><div class="l">Manque détecté</div></div>
      <div class="stat over"><div class="n" id="stat-over">${totalSurplus}</div><div class="l">Surplus</div></div>
      <div class="stat"><div class="n" id="stat-none">${totalNonCompte}</div><div class="l">Non comptés</div></div>
    </div>
  `;

  cats.forEach(cat=>{
    const rows = rowsByCategory[cat];
    if(!rows || rows.length === 0) return;
    html += `<div class="category"><h2>${cat}</h2><div class="table-scroll"><table>
      <thead><tr>
        <th>Désignation</th><th>Stock fixe</th><th>Ventes (rapport X)</th>
        <th>Stock attendu</th><th>Stock réel compté</th><th>Écart</th><th>Commentaire</th>
      </tr></thead><tbody>`;
    rows.forEach(({item,r})=>{
      const badgeHtml = r.stockReel === null
        ? `—`
        : `${r.ecart > 0 ? '+' : ''}${r.ecart}`;
      const badgeClass = r.stockReel === null ? '' : r.status;
      const commentaire = (currentEntries[item.id] && currentEntries[item.id].commentaire) || '';
      html += `<tr data-item-id="${item.id}">
        <td class="name">${item.name}</td>
        <td class="num">${item.fixedStock}</td>
        <td><input class="cell-input ventes-input" type="number" step="1" value="${r.ventes || ''}" placeholder="0"></td>
        <td class="num" id="attendu-${item.id}">${r.attendu}</td>
        <td><input class="cell-input stockreel-input" type="number" step="1" value="${currentEntries[item.id] && currentEntries[item.id].stockReel !== undefined ? currentEntries[item.id].stockReel : ''}" placeholder="—"></td>
        <td><span class="badge ${badgeClass}" id="badge-${item.id}">${badgeHtml}</span></td>
        <td><input class="cell-input comment-input" type="text" value="${commentaire.replace(/"/g,'&quot;')}" placeholder="Commentaire"></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });

  html += `<div class="actions-bar">
    <button class="ghost" id="resetDayBtn">Réinitialiser la saisie</button>
    <button class="primary" id="saveDayBtn">Enregistrer le contrôle</button>
  </div>`;

  el.innerHTML = html;

  el.querySelectorAll('tr[data-item-id]').forEach(tr=>{
    const itemId = tr.getAttribute('data-item-id');
    const item = items.find(i=>i.id===itemId);
    const ventesInput = tr.querySelector('.ventes-input');
    const stockReelInput = tr.querySelector('.stockreel-input');
    const commentInput = tr.querySelector('.comment-input');
    ventesInput.addEventListener('input', ()=>{
      currentEntries[itemId] = currentEntries[itemId] || {};
      currentEntries[itemId].ventes = ventesInput.value;
      updateRowDisplay(item);
      updateSummaryStats();
    });
    commentInput.addEventListener('input', ()=>{
      currentEntries[itemId] = currentEntries[itemId] || {};
      currentEntries[itemId].commentaire = commentInput.value;
    });
    stockReelInput.addEventListener('input', ()=>{
      currentEntries[itemId] = currentEntries[itemId] || {};
      currentEntries[itemId].stockReel = stockReelInput.value;
      updateRowDisplay(item);
      updateSummaryStats();
    });
  });

  document.getElementById('saveDayBtn').addEventListener('click', ()=> saveReport(currentDate));
  document.getElementById('resetDayBtn').addEventListener('click', ()=>{
    if(confirm('Effacer toutes les valeurs saisies pour cette date (non encore enregistrées) ?')){
      currentEntries = {};
      renderToday();
    }
  });
}

// Updates only the computed cells for a single row (stock attendu + écart badge)
// without rebuilding the table, so the input the user is typing in never loses focus.
function updateRowDisplay(item){
  const r = computeRow(item);
  const attenduCell = document.getElementById('attendu-'+item.id);
  const badge = document.getElementById('badge-'+item.id);
  if(attenduCell) attenduCell.textContent = r.attendu;
  if(badge){
    badge.className = 'badge' + (r.stockReel === null ? '' : ' '+r.status);
    badge.textContent = r.stockReel === null ? '—' : (r.ecart > 0 ? '+' : '')+r.ecart;
  }
}

// Recomputes the four summary counters without touching the table/inputs.
function updateSummaryStats(){
  let totalOk = 0, totalManque = 0, totalSurplus = 0, totalNonCompte = 0;
  items.forEach(item=>{
    const r = computeRow(item);
    if(r.stockReel === null) totalNonCompte++;
    else if(r.status === 'ok') totalOk++;
    else if(r.status === 'bad') totalManque++;
    else if(r.status === 'over') totalSurplus++;
  });
  const setText = (id,val)=>{ const e=document.getElementById(id); if(e) e.textContent = val; };
  setText('stat-ok', totalOk);
  setText('stat-bad', totalManque);
  setText('stat-over', totalSurplus);
  setText('stat-none', totalNonCompte);
}

async function renderHistory(){
  const el = document.getElementById('tab-history');
  el.innerHTML = `<div class="empty"><p class="sig">Chargement…</p></div>`;
  let keys = [];
  try{
    const res = await storage.list('report:');
    const allKeys = (res && res.keys) ? res.keys : [];
    // Le Bar garde les clés historiques "report:AAAA-MM-JJ" pour
    // conserver la compatibilité avec l'historique déjà enregistré.
    // Le Snack utilise ses propres clés "report:snack:AAAA-MM-JJ".
    keys = currentCategory === 'snack'
      ? allKeys.filter(k => k.indexOf('report:snack:') === 0)
      : allKeys.filter(k => k.indexOf('report:snack:') !== 0);
  }catch(e){ keys = []; }

  if(keys.length === 0){
    el.innerHTML = `<div class="empty"><p class="sig">Aucun contrôle enregistré</p><p>Les contrôles sauvegardés depuis l'onglet "Contrôle du jour" apparaîtront ici.</p></div>`;
    return;
  }

  const entries = [];
  for(const k of keys){
    const d = k.replace(getReportKeyPrefix(),'');
    let responsable = '', heure = '';
    try{
      const res = await storage.get(k);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        responsable = parsed.responsable || '';
        heure = parsed.heure || '';
      }
    }catch(e){ /* ignore */ }
    entries.push({d, responsable, heure});
  }
  entries.sort((a,b)=> a.d < b.d ? 1 : -1);

  let html = `<div class="history-list">`;
  entries.forEach(({d, responsable, heure})=>{
    const meta = [
      responsable ? 'Contrôle par '+responsable : 'Responsable non renseigné',
      heure ? 'à '+heure : ''
    ].filter(Boolean).join(' ');
    html += `<div class="history-item" data-date="${d}">
      <div class="history-click" data-date="${d}"><div class="d">${formatDate(d)}</div><div class="m">${meta}</div></div>
      <button class="hist-print-btn" data-print-date="${d}" title="Imprimer ce rapport">🖨️</button>
      <button class="hist-del-btn" data-del-date="${d}" title="Supprimer ce contrôle">✕</button>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;

  el.querySelectorAll('.history-click').forEach(div=>{
    div.addEventListener('click', ()=>{
      const d = div.getAttribute('data-date');
      requireAuth(async ()=>{
        currentDate = d;
        document.getElementById('reportDate').value = d;
        await loadReport(d);
        switchTab('today');
      });
    });
  });

  el.querySelectorAll('.hist-print-btn').forEach(btn=>{
    btn.addEventListener('click', async (evt)=>{
      evt.stopPropagation();
      const d = btn.getAttribute('data-print-date');
      try{
        const res = await storage.get(getReportKeyPrefix()+d);
        if(res && res.value){
          showPrintableReport(JSON.parse(res.value));
        }
      }catch(err){
        console.error(err);
        showToast('Impossible de charger ce rapport');
      }
    });
  });

  el.querySelectorAll('.hist-del-btn').forEach(btn=>{
    btn.addEventListener('click', async (evt)=>{
      evt.stopPropagation();
      const d = btn.getAttribute('data-del-date');
      if(confirm('Supprimer définitivement le contrôle du '+formatDate(d)+' ? Cette action est irréversible.')){
        try{
          await storage.delete(getReportKeyPrefix()+d);
          showToast('Contrôle du '+formatDate(d)+' supprimé');
          renderHistory();
        }catch(err){
          console.error(err);
          showToast('Erreur : la suppression a échoué');
        }
      }
    });
  });
}

function renderConfig(){
  const el = document.getElementById('tab-config');
  let html = `<div class="config-note">
    <b>Stock fixe</b> = quantité que le bar doit toujours avoir en début de service pour cet article.
    Modifiez les valeurs ci-dessous si votre stock de référence change. Ces données sont partagées entre
    tous les utilisateurs de ce lien.
  </div>
  <div class="actions-bar" style="justify-content:flex-start;position:static;margin-bottom:20px;">
    <button class="ghost" id="resetListBtn">Revenir à la liste par défaut</button>
  </div>`;

  const cats = getCategoriesList();
  const byCategory = {};
  cats.forEach(c=>byCategory[c]=[]);
  items.forEach(it=>{ if(!byCategory[it.category]) byCategory[it.category]=[]; byCategory[it.category].push(it); });

  cats.forEach(cat=>{
    const rows = byCategory[cat] || [];
    html += `<div class="category"><h2>${cat}<button class="add-btn" data-add-cat="${cat}">+ Ajouter un article</button></h2>
      <div class="table-scroll"><table><thead><tr><th>Désignation</th><th>Stock fixe</th><th></th></tr></thead><tbody>`;
    rows.forEach(item=>{
      html += `<tr data-item-id="${item.id}">
        <td class="name"><input class="cell-input new-name-input name-input" type="text" value="${item.name}"></td>
        <td><input class="cell-input fixed-input" type="number" step="1" value="${item.fixedStock}"></td>
        <td><button class="del-btn" data-del="${item.id}" title="Supprimer">✕</button></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });

  el.innerHTML = html;

  el.querySelectorAll('.name-input').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const tr = inp.closest('tr');
      const id = tr.getAttribute('data-item-id');
      const item = items.find(i=>i.id===id);
      item.name = inp.value;
      await saveItems();
    });
  });
  el.querySelectorAll('.fixed-input').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const tr = inp.closest('tr');
      const id = tr.getAttribute('data-item-id');
      const item = items.find(i=>i.id===id);
      item.fixedStock = Number(inp.value) || 0;
      await saveItems();
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-del');
      const item = items.find(i=>i.id===id);
      if(confirm(`Supprimer "${item.name}" de la liste ?`)){
        items = items.filter(i=>i.id!==id);
        delete currentEntries[id];
        await saveItems();
        renderConfig();
      }
    });
  });
  el.querySelectorAll('[data-add-cat]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const cat = btn.getAttribute('data-add-cat');
      items.push({id:uid(), category:cat, name:'Nouvel article', fixedStock:0});
      await saveItems();
      renderConfig();
    });
  });

  document.getElementById('resetListBtn').addEventListener('click', async ()=>{
    if(confirm('Remplacer la liste actuelle par la liste par défaut ('+getCategoriesList().join(', ')+') ? Les articles ajoutés manuellement en dehors de cette liste seront supprimés.')){
      items = getDefaultItems().map(([category,name,fixedStock])=>({id:uid(),category,name,fixedStock}));
      await saveItems();
      renderConfig();
      showToast('Liste réinitialisée');
    }
  });
}

function switchTab(name){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-tab')===name);
  });
  document.getElementById('tab-today').style.display = name==='today' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = name==='history' ? 'block' : 'none';
  document.getElementById('tab-config').style.display = name==='config' ? 'block' : 'none';
  if(name==='today') renderToday();
  if(name==='history') renderHistory();
  if(name==='config') renderConfig();
}

// ============================================================
// MOT DE PASSE pour la saisie (onglets "Contrôle du jour" et
// "Configuration"). L'onglet "Historique" reste libre pour que
// les personnes qui suivent le stock (ex: Mme Hajer, M. Sami)
// puissent consulter sans mot de passe.
// Changez la valeur ci-dessous pour définir votre propre mot de passe.
// Attention : ce mot de passe est visible dans le code source du
// fichier ; c'est une protection simple contre les modifications
// accidentelles, pas un vrai système de sécurité.
// ============================================================
const EDIT_PASSWORD = "jalta2026";

let isUnlocked = false;

function requireAuth(onSuccess){
  if(isUnlocked){ onSuccess(); return; }
  const overlay = document.getElementById('authOverlay');
  const input = document.getElementById('authPasswordInput');
  const errorEl = document.getElementById('authError');
  input.value = '';
  errorEl.style.display = 'none';
  overlay.classList.add('show');
  setTimeout(()=>input.focus(), 50);

  const submit = ()=>{
    if(input.value === EDIT_PASSWORD){
      isUnlocked = true;
      overlay.classList.remove('show');
      cleanup();
      onSuccess();
    }else{
      errorEl.style.display = 'block';
      input.value = '';
      input.focus();
    }
  };
  const cancel = ()=>{
    overlay.classList.remove('show');
    cleanup();
  };
  const onKeydown = (e)=>{ if(e.key === 'Enter') submit(); if(e.key === 'Escape') cancel(); };

  function cleanup(){
    document.getElementById('authSubmitBtn').removeEventListener('click', submit);
    document.getElementById('authCancelBtn').removeEventListener('click', cancel);
    input.removeEventListener('keydown', onKeydown);
  }

  document.getElementById('authSubmitBtn').addEventListener('click', submit);
  document.getElementById('authCancelBtn').addEventListener('click', cancel);
  input.addEventListener('keydown', onKeydown);
}

document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.addEventListener('click', ()=>{
    switchTab(b.getAttribute('data-tab'));
  });
});

function applyCategoryUI(){
  document.getElementById('brandEyebrow').textContent = 'Jalta Hotel · ' + getCategoryLabel();
  document.querySelectorAll('#catSwitch button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-cat') === currentCategory);
  });
}

document.querySelectorAll('#catSwitch button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const cat = btn.getAttribute('data-cat');
    if(cat === currentCategory) return;
    currentCategory = cat;
    localStorage.setItem('jalta_category', currentCategory);
    applyCategoryUI();
    requireAuth(async ()=>{
      await loadItems();
      const activeTabBtn = document.querySelector('nav.tabs button.active');
      switchTab(activeTabBtn ? activeTabBtn.getAttribute('data-tab') : 'history');
    });
  });
});

document.getElementById('reportDate').addEventListener('change', async (e)=>{
  currentDate = e.target.value;
  await loadReport(currentDate);
  renderToday();
});

document.getElementById('responsableInput').addEventListener('input', (e)=>{
  currentResponsable = e.target.value;
});

document.getElementById('heureInput').addEventListener('input', (e)=>{
  currentHeure = e.target.value;
});

// Toute la page est désormais protégée : rien ne s'affiche tant que
// le mot de passe n'a pas été validé.
(function init(){
  document.getElementById('reportDate').value = currentDate;
  applyCategoryUI();
  requireAuth(async ()=>{
    document.querySelector('.wrap').style.display = 'block';
    await loadItems();
    renderHistory();
  });
})();

</script>
